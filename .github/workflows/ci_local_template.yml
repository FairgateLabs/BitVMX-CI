name: 'CI Template for PRs'

on:
  workflow_dispatch:  # Allows manual triggering
  workflow_call:
    inputs:
      repo: 
        description: 'Repository to check out'
        required: true
        type: string
      submodule_path:
        description: 'Path to the submodule within the repository'
        required: true
        type: string
      cargo_lock_path:
        description: 'Path to the Cargo.lock file'
        required: true
        type: string
      target_path:
        description: 'Path to the target directory'
        required: true
        type: string
      docker_required:
        description: 'Whether to execute Docker-related steps'
        required: false
        type: boolean
        default: false
      dockerfile_path:
        description: 'Path to Docker file'
        required: false
        type: string        
      docker_compose_path:
        description: 'Path to docker-compose file'
        required: false
        type: string
      cargo_features:
        description: 'Cargo features to enable (space or comma separated)'
        required: false
        type: string
      clippy:
        description: 'Flag to determine if format with clippy is triggered'
        required: false
        type: boolean
      build_cpu:
        description: 'Flag to determine if we need to build the CPU'
        required: false
        type: boolean
        default: false
      single_thread_tests:
        description: 'Run tests with --test-threads=1'
        required: false
        type: boolean
        default: false
      measure_coverage:
        description: 'Whether to measure code coverage (default: true). Set to false to skip coverage.'
        required: false
        type: boolean
        default: true
      coverage_exclude:
        description: 'Comma or space separated path patterns (regex) to exclude from coverage (e.g. "tests/,benches/,examples/")'
        required: false
        type: string
    secrets:
      REPO_ACCESS_TOKEN:
        description: 'Token to access the repository'
        required: true
      SSH_PRIVATE_KEY:
        description: 'Private SSH key to authenticate with GitHub'
        required: true
      SLACK_WEBHOOK_URL:
        description: 'Webhook endpoint to post on channel'
        required: false

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    env:
      ROOT: "/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}"
      REPO_NAME: ${{ github.event.repository.name }}
      BRANCH: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Cleanup Disk Space
        run: |
          echo "🧹 Cleaning up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "✅ Disk cleanup completed"
            
      - name: Check disk space
        run: df -h

      - name: Configure SSH for Git Submodule Access
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure Git with Token Authentication
        run: |
          git config --global url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          REPO_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
     
      - name: Checkout Workspace Repository
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ ^\[([^\]]+)\] ]]; then
            SAFE_BRANCH="${BASH_REMATCH[1]}"
          else
            SAFE_BRANCH="main"
          fi
          
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV
          echo "✅ Using branch: $SAFE_BRANCH"
          
          git clone --recurse-submodules --depth=1 --branch "$SAFE_BRANCH" --shallow-submodules https://github.com/${{ inputs.repo }} rust-bitvmx-workspace
      
      - name: Checkout Current Repository
        run: |
          if [[ -n "${{ github.head_ref }}" ]]; then
            SUBMODULE_BRANCH="${{ github.head_ref }}"
            echo "✅ Using PR branch for submodule: $SUBMODULE_BRANCH"
          else
            SUBMODULE_BRANCH="${{ github.ref_name }}"
            echo "⚠️ No PR branch found (likely push to $SUBMODULE_BRANCH), using $SUBMODULE_BRANCH"
          fi
          
          echo "SUBMODULE_BRANCH=$SUBMODULE_BRANCH" >> $GITHUB_ENV
          echo "Checking out submodule branch: $SUBMODULE_BRANCH"
          git clone --depth=1 --branch "$SUBMODULE_BRANCH" https://github.com/FairgateLabs/${{ inputs.submodule_path }} ${{ inputs.submodule_path }}

      - name: Override Submodule Branches from PR Description
        run: |
          PR_BODY=$(cat <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          )
          
          if [[ -z "$PR_BODY" ]]; then
            echo "OVERRIDDEN_MODULES=" >> $GITHUB_ENV
            exit 0
          fi
          
          FOUND_ANY=false
          declare -A OVERRIDES
          OVERRIDDEN_MODULES=""
          
          cd "$ROOT/rust-bitvmx-workspace" || exit 1
          
          while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\r\n' | xargs)
            [[ -z "$line" ]] && continue
            
            if [[ "${line,,}" == override:* ]]; then
              line="${line#*:}"
              line=$(echo "$line" | xargs)
              
              if [[ "$line" == *":"* ]]; then
                REPO="${line%%:*}"
                BRANCH="${line#*:}"
                REPO=$(echo "$REPO" | tr -d '\r\n' | xargs)
                BRANCH=$(echo "$BRANCH" | tr -d '\r\n' | xargs)
                
                [[ -z "$REPO" || -z "$BRANCH" ]] && continue
                
                if [[ -d "$REPO" ]]; then
                  OVERRIDES["$REPO"]="$BRANCH"
                  FOUND_ANY=true
                  OVERRIDDEN_MODULES="$OVERRIDDEN_MODULES $REPO"
                  echo "Override: $REPO -> $BRANCH"
                fi
              fi
            fi
          done <<< "$PR_BODY"
          
          if [[ "$FOUND_ANY" == "false" ]]; then
            echo "OVERRIDDEN_MODULES=" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "OVERRIDDEN_MODULES=$OVERRIDDEN_MODULES" >> $GITHUB_ENV
          
          for SUBMODULE in "${!OVERRIDES[@]}"; do
            BRANCH="${OVERRIDES[$SUBMODULE]}"
            rm -rf "$SUBMODULE"
            
            if git clone --depth=1 --branch "$BRANCH" "https://github.com/FairgateLabs/$SUBMODULE" "$SUBMODULE" 2>&1; then
              echo "✅ $SUBMODULE@$BRANCH"
            else
              echo "❌ Failed to clone $SUBMODULE@$BRANCH"
              exit 1
            fi
          done

      - name: Reorganize Workspace Structure
        run: |
          echo "Reorganizing workspace for PR build..."
          cd "$ROOT/rust-bitvmx-workspace"
          
          if [[ -f ".cargo/config.toml" ]]; then
            echo "Copying .cargo/config.toml to preserve patches"
            cp -f ".cargo/config.toml" "/home/runner/work/${{ inputs.submodule_path }}/${{ inputs.submodule_path }}/.cargo/config.toml" 2>/dev/null || true
          fi
          
          find /home/runner/work/${{ inputs.submodule_path }}/${{ inputs.submodule_path }}/rust-bitvmx-workspace \
            -mindepth 1 -maxdepth 1 ! -name '${{ inputs.submodule_path }}' \
            -exec mv {} /home/runner/work/${{ inputs.submodule_path }}/${{ inputs.submodule_path }}/ \;
          
          echo "✅ Workspace reorganization completed"

      - name: Verify Submodule Overrides
        if: env.OVERRIDDEN_MODULES != ''
        run: |
          echo "Verifying overridden submodules:"
          
          for SUBMODULE in $OVERRIDDEN_MODULES; do
            if [[ -d "$SUBMODULE/.git" ]]; then
              cd "$SUBMODULE"
              BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "detached")
              COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
              echo "✅ $SUBMODULE: $BRANCH @ $COMMIT"
              cd ..
            fi
          done

      - name: Install Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: ${{ inputs.measure_coverage }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      
      - name: Lint with rustfmt
        continue-on-error: true
        working-directory: ${{ inputs.submodule_path }}
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        if: ${{ inputs.clippy }}
        continue-on-error: true
        working-directory: ${{ inputs.submodule_path }}
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cache Rust Toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: ${{ runner.os }}-rustup-${{ hashFiles('**/rust-toolchain*') }}
          restore-keys: |
            ${{ runner.os }}-rustup-

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Submodule Target Directory
        uses: actions/cache@v4
        with:
          path: ${{ inputs.submodule_path }}/target
          key: ${{ runner.os }}-${{ inputs.submodule_path }}-target-${{ hashFiles(format('{0}/Cargo.lock', inputs.submodule_path)) }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.submodule_path }}-target-

      ############ DOCKER SETUP OPTIONAL STEPS ############      
      - name: Set up Docker Buildx
        if: ${{ inputs.docker_required }}
        uses: docker/setup-buildx-action@v3

      - name: Create cache directory
        if: ${{ inputs.docker_required }}
        run: mkdir -p /tmp/.buildx-cache

      - name: Cache Docker layers
        if: ${{ inputs.docker_required }}
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image        
        if: ${{ inputs.docker_required }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.submodule_path }}
          file: ./${{ inputs.submodule_path }}/${{ inputs.dockerfile_path }}
          push: false
          tags: test-image:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Run docker-compose
        if: ${{ inputs.docker_required }}
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: "./${{ inputs.submodule_path }}/${{ inputs.docker_compose_path }}"

      ############ END DOCKER OPTIONAL SETUP STEPS ############

      - name: Build BitVMX-CPU Emulator
        if: ${{ inputs.build_cpu }}
        working-directory: ${{ inputs.submodule_path }}
        run: |
          if [[ ! -f "scripts/build-emulator.sh" ]]; then
            echo "❌ Build script not found: scripts/build-emulator.sh"
            exit 1
          fi
          
          chmod +x scripts/build-emulator.sh
          timeout 600 scripts/build-emulator.sh
      
      - name: Run Tests
        working-directory: ${{ inputs.submodule_path }}
        timeout-minutes: 90
        run: |
          echo "🧪 Running tests..."

          FEATURES="${{ inputs.cargo_features }}"

          # Build cargo args array
          CARGO_ARGS=()
          if [[ -n "$FEATURES" ]]; then
            echo "📦 Using features: $FEATURES"
            CARGO_ARGS+=(--features "$FEATURES")
          else
            echo "📦 Running tests without additional features"
          fi

          # Build test binary args array
          TEST_ARGS=()
          if [[ "${{ inputs.single_thread_tests }}" == "true" ]]; then
            echo "🔧 Running tests with single thread"
            TEST_ARGS+=(-- --test-threads=1)
          fi

          if [[ "${{ inputs.measure_coverage }}" != "false" ]]; then
            echo "📊 Running tests with coverage measurement..."

            # Build exclude regex from comma/space separated list
            RAW_EXCLUDE="${{ inputs.coverage_exclude }}"
            if [[ -n "$RAW_EXCLUDE" ]]; then
              EXCLUDE_REGEX=$(echo "$RAW_EXCLUDE" | tr ', ' '\n' | grep -v '^$' | paste -sd'|' -)
              echo "🚫 Excluding from coverage: $EXCLUDE_REGEX"
              CARGO_ARGS+=(--ignore-filename-regex "$EXCLUDE_REGEX")
            fi

            cargo llvm-cov \
              --verbose \
              --json --summary-only --output-path coverage-summary.json \
              "${CARGO_ARGS[@]}" "${TEST_ARGS[@]}"
          else
            echo "⏭️ Skipping coverage measurement"
            cargo test --verbose "${CARGO_ARGS[@]}" "${TEST_ARGS[@]}"
          fi
        env:
          CI: true
          RUST_BACKTRACE: 1
          RUST_LOG: info

      - name: Post Coverage Comment on PR
        if: ${{ inputs.measure_coverage && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '${{ inputs.submodule_path }}/coverage-summary.json';

            if (!fs.existsSync(summaryPath)) {
              console.log('No coverage-summary.json found, skipping comment.');
              return;
            }

            const data = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const totals = data.data[0].totals;

            const badge = (pct) => pct >= 80 ? '🟢' : pct >= 60 ? '🟡' : '🔴';
            const fmt   = (metric) => `${metric.covered}/${metric.count} (${metric.percent.toFixed(1)}%)`;
            const pct   = (metric) => metric.percent;

            const lines     = totals.lines;
            const functions = totals.functions;
            const branches  = totals.branches;

            let body = `<!-- coverage-report -->\n## 📊 Coverage Report\n\n`;
            body += `| Metric | Covered / Total | % |\n`;
            body += `|--------|-----------------|---|\n`;
            body += `| ${badge(pct(lines))} Lines | ${fmt(lines)} | ${pct(lines).toFixed(1)}% |\n`;
            body += `| ${badge(pct(functions))} Functions | ${fmt(functions)} | ${pct(functions).toFixed(1)}% |\n`;
            if (branches && branches.count > 0) {
              body += `| ${badge(pct(branches))} Branches | ${fmt(branches)} | ${pct(branches).toFixed(1)}% |\n`;
            }
            body += `\n> Workflow run: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            const marker = '<!-- coverage-report -->';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Coverage comment updated.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Coverage comment created.');
            }

      - name: Move Docker cache
        if: always() && inputs.docker_required
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up temporary files..."
          rm -rf /tmp/.buildx-cache || true
          rm -rf target/debug/deps || true
          echo "✅ Cleanup completed"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *CI Result* for `${{ github.repository }}`\n*${{ github.workflow }}* job has *${{ job.status }}* :rocket:\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View full run>\n*Author:* ${{ github.event.pull_request.user.login || github.actor }}\n*Branch:* `${{ env.BRANCH }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅' || '❌' }} *CI Build*\n*Status:* ${{ job.status }}\n*Repository:* `${{ github.repository }}`\n*Branch:* `${{ env.BRANCH }}`\n*Author:* ${{ github.event.pull_request.user.login || github.actor }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View full run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
